# ============================================================================
# GitHub Actions CI/CD Pipeline Configuration
# GitHub Container Registry (GHCR) 자동 빌드 및 푸시 워크플로우
# ============================================================================
name: Build and Publish Docker Image to GHCR

# 워크플로우 트리거 조건 설정
on:
  push:
    branches: [ "main" ] # main 브랜치에 코드가 푸시될 때마다 자동으로 실행됩니다.

env:
  REGISTRY: ghcr.io
  # github.repository 프로퍼티를 통해 '<깃허브_유저네임>/<레포지토리_이름>' 형태로 자동 지정됩니다.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # 패키지 배포를 위해 GITHUB_TOKEN에 권한을 부여합니다.
    permissions:
      contents: read
      packages: write # GHCR에 컨테이너 이미지를 업로드(write)하기 위해 반드시 필요한 권한입니다.

    steps:
      # 1. GitHub 저장소의 코드를 빌드 서버로 가져옵니다.
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Docker 빌드를 가속화하기 위해 QEMU 및 Buildx 환경을 설정합니다.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. GitHub Container Registry (GHCR)에 로그인을 수행합니다.
      # GITHUB_TOKEN secrets는 깃허브 Actions에서 가동 시 일회성으로 자동 발급해 줍니다.
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Docker 이미지에 부여할 태그(latest 및 커밋 SHA)와 메타데이터를 추출합니다.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,value=${{ github.sha }}

      # 5. Docker 컨테이너 이미지를 빌드하고 최종적으로 GHCR에 푸시(업로드)합니다.
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max